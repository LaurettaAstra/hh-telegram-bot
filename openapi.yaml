openapi: 3.0.3
info:
  title: HH Vacancy Bot - API Specification
  description: |
    This project is a **Telegram bot** for searching HH.ru vacancies. It does NOT expose a REST API.

    ## Project Architecture
    - **Telegram Bot**: Commands /start, /search, /filters, /info (via python-telegram-bot)
    - **External API**: Consumes HH.ru API (https://api.hh.ru) for vacancy search
    - **Database**: PostgreSQL with SQLAlchemy (User, SavedFilter, Vacancy models)

    ## Documented Here
    1. **External HH.ru API** - The API this project consumes for vacancy search
    2. **Schemas** - Derived from SQLAlchemy models (for future REST API or reference)
    3. **TODO** - Potential REST endpoints if a web layer is added
  version: 1.0.0
  contact:
    name: HH Vacancy Bot

servers:
  - url: https://api.hh.ru
    description: HH.ru public API (external, consumed by the bot)
  # TODO: Add local/dev server when REST API is implemented
  # - url: http://localhost:8000
  #   description: Local development (future REST API)

tags:
  - name: Vacancies
    description: HH.ru vacancy search (external API)
  - name: Users
    description: TODO - User management (future REST API)
  - name: Filters
    description: TODO - Saved search filters (future REST API)

paths:
  # =============================================================================
  # External HH.ru API - consumed by app/hh_api.py
  # =============================================================================
  /vacancies:
    get:
      tags:
        - Vacancies
      summary: Search vacancies (HH.ru API)
      description: |
        External HH.ru API. Called by `app.hh_api.get_vacancies_page()` and `search_vacancies()`.
        Used for interactive search and monitoring.
      operationId: getVacancies
      parameters:
        - name: text
          in: query
          description: Search query. Project uses AND/NOT operators for keywords.
          schema:
            type: string
            example: "системный аналитик AND бизнес аналитик NOT 1С"
        - name: search_field
          in: query
          description: Fields to search. Project uses name, description.
          schema:
            type: array
            items:
              type: string
              enum: [name, description, company_name]
        - name: area
          in: query
          description: HH.ru area ID (e.g. 1 = Moscow)
          schema:
            type: integer
        - name: per_page
          in: query
          schema:
            type: integer
            default: 100
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: order_by
          in: query
          schema:
            type: string
            enum: [publication_time, salary_desc, salary_asc]
            default: publication_time
        - name: period
          in: query
          description: Vacancies published in last N days
          schema:
            type: integer
            enum: [1, 3, 7, 30]
        - name: experience
          in: query
          description: HH.ru experience code
          schema:
            type: string
            enum: [noExperience, between1And3, between3And6, moreThan6]
        - name: employment
          in: query
          description: HH.ru employment code
          schema:
            type: string
            enum: [full, part, project, volunteer, probation]
        - name: schedule
          in: query
          description: Work schedule. Project uses remote, flyInFlyOut, fullDay
          schema:
            type: string
            enum: [remote, flyInFlyOut, fullDay]
        - name: salary
          in: query
          description: Minimum salary filter
          schema:
            type: integer
      responses:
        "200":
          description: Vacancy search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HHVacancySearchResponse"
        "4xx":
          description: HH.ru API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # =============================================================================
  # TODO - Future REST API endpoints (not implemented)
  # =============================================================================
  # /api/users:
  #   get:
  #     tags: [Users]
  #     summary: TODO - List users
  #   post:
  #     tags: [Users]
  #     summary: TODO - Create user
  # /api/users/{telegram_id}:
