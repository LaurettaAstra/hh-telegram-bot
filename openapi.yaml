components:
  schemas:
    # ---------------------------------------------------------------------------
    # HH.ru API response schemas (external)
    # ---------------------------------------------------------------------------
    HHVacancySearchResponse:
      type: object
      properties:
        found:
          type: integer
          description: Total number of vacancies found
        pages:
          type: integer
        per_page:
          type: integer
        page:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/HHVacancyItem"

    HHVacancyItem:
      type: object
      description: Raw HH.ru API vacancy item
      properties:
        id:
          type: string
        name:
          type: string
        alternate_url:
          type: string
        published_at:
          type: string
          format: date-time
        salary:
          $ref: "#/components/schemas/HHSalary"
        employer:
          type: object
          properties:
            name:
              type: string
        schedule:
          type: object
          properties:
            name:
              type: string
        experience:
          type: object
          properties:
            name:
              type: string
        employment:
          type: object
          properties:
            name:
              type: string
        area:
          type: object
          properties:
            name:
              type: string
        snippet:
          type: object

    HHSalary:
      type: object
      properties:
        from:
          type: integer
        to:
          type: integer
        currency:
          type: string

    # ---------------------------------------------------------------------------
    # Project internal schemas (from app/models.py - SQLAlchemy)
    # ---------------------------------------------------------------------------
    User:
      type: object
      description: User model from app.models.User
      properties:
        id:
          type: integer
          readOnly: true
        telegram_id:
          type: integer
          format: int64
          description: Telegram user ID
        username:
          type: string
          nullable: true
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        is_active:
          type: boolean
          default: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    SavedFilter:
      type: object
      description: Saved search filter from app.models.SavedFilter
      properties:
        id:
          type: integer
          readOnly: true
        user_id:
          type: integer
          readOnly: true
        name:
          type: string
        title_keywords:
          type: string
          nullable: true
        title_exclude_keywords:
          type: string
          nullable: true
        description_keywords:
          type: string
          nullable: true
        description_exclude_keywords:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        work_format:
          type: string
          nullable: true
          description: schedule - remote, fullDay, flyInFlyOut
        experience:
          type: string
          nullable: true
          description: noExperience, between1And3, etc.
        employment:
          type: string
          nullable: true
          description: full, part, project, etc.
        salary_from:
          type: integer
          nullable: true
        monitoring_enabled:
          type: boolean
          default: false
        last_monitoring_at:
          type: string
          format: date-time
          nullable: true
        monitoring_started_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    SavedFilterCreate:
      type: object
      description: Request body for creating a filter (from user_repository.save_user_filter)
      required:
        - name
      properties:
        name:
          type: string
        title_keywords:
          type: string
          nullable: true
        title_exclude_keywords:
          type: string
          nullable: true
        description_keywords:
          type: string
          nullable: true
        description_exclude_keywords:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        work_format:
          type: string
          nullable: true
        experience:
          type: string
          nullable: true
        employment:
          type: string
          nullable: true
        salary_from:
          type: integer
          nullable: true
        monitoring_enabled:
          type: boolean
          default: false

    Vacancy:
      type: object
      description: Vacancy model from app.models.Vacancy (stored in DB)
      properties:
        id:
          type: integer
          readOnly: true
        hh_id:
          type: string
          description: HH.ru vacancy ID
        title:
          type: string
        company:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        salary_from:
          type: integer
          nullable: true
        salary_to:
          type: integer
          nullable: true
        currency:
          type: string
          nullable: true
        url:
          type: string
          nullable: true
        published_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true

    VacancyDisplay:
      type: object
      description: Processed vacancy dict from hh_api._process_vacancy_items (sent to user)
      properties:
        id:
          type: string
          description: HH.ru vacancy ID
        name:
          type: string
        company:
          type: string
        salary:
          type: string
          description: Formatted salary string
        salary_from:
          type: integer
          nullable: true
        salary_to:
          type: integer
          nullable: true
        currency:
          type: string
          nullable: true
        area:
          type: string
        schedule:
          type: string
        experience:
          type: string
        employment:
          type: string
        url:
          type: string
        published_at:
          type: string
          format: date-time
          nullable: true

    SearchSession:
      type: object
      description: Search session from app.models.SearchSession
      properties:
        id:
          type: integer
          readOnly: true
        user_id:
          type: integer
        title_keywords:
          type: string
          nullable: true
        title_exclude_keywords:
          type: string
          nullable: true
        description_keywords:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        work_format:
          type: string
          nullable: true
        salary_from:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time

    FilterVacancyMatch:
      type: object
      description: Tracks vacancy sent to user for filter (app.models.FilterVacancyMatch)
      properties:
        id:
          type: integer
        filter_id:
          type: integer
        vacancy_id:
          type: integer
        matched_at:
          type: string
          format: date-time
        sent_to_user:
          type: boolean

    Error:
      type: object
      properties:
        description:
          type: string
        errors:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              value:
                type: string
